name: Deploy Laravel (No DB)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://web2-laravel-starter.fyas.my.id

    steps:
      - name: Deploy ke VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 10080
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/web2-fyas
            git pull origin main

            composer install --no-dev --optimize-autoloader

            # setup env kalau belum ada
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # paksa pakai sqlite
            sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
            touch database/database.sqlite

            # generate key kalau belum ada
            if ! grep -q "APP_KEY=base64" .env; then
              php artisan key:generate
            fi

            # clear & optimize
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear

            php artisan config:cache
            php artisan route:cache || true
            php artisan view:cache

            # restart / start laravel
            pm2 restart laravel || pm2 start "php artisan serve --host=0.0.0.0 --port=8000" --name laravel
